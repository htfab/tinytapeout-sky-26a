# Tiny Tapeout project information
project:
  title:        "Tiny PIO"      # Project title
  author:       "Linus Skucas"      # Your name
  discord:      "_.linus._"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Programmable IO"      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "3x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_LinusSkucas_pio"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "GPIO in"
  ui[1]: "GPIO in"
  ui[2]: "GPIO in"
  ui[3]: "GPIO in"
  ui[4]: "GPIO in"
  ui[5]: "GPIO in"
  ui[6]: "GPIO in"
  ui[7]: "GPIO in"

  # Outputs
  uo[0]: "GPIO out"
  uo[1]: "GPIO out"
  uo[2]: "GPIO out"
  uo[3]: "GPIO out"
  uo[4]: "GPIO out"
  uo[5]: "GPIO out"
  uo[6]: "GPIO out"
  uo[7]: "GPIO out"

  # Bidirectional pins
  uio[0]: "load"
  uio[1]: "ext_addr[0]"
  uio[2]: "ext_addr[1]"
  uio[3]: "ext_addr[2]"
  uio[4]: "io[0]"
  uio[5]: "io[1]"
  uio[6]: "io[2]"
  uio[7]: "io[3]"

# Do not change!
yaml_version: 6
