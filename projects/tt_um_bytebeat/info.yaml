# Tiny Tapeout project information
project:
  title:        "Algorithmic Pattern Generator"
  author:       "Olonade Kelvin"
  discord:      "Olonade Kelvin"
  description:  "A hardware-based Bytebeat generative pattern engine."
  how_it_works: "A 16-bit counter (t) is processed through 8 selectable bitwise mathematical algorithms."
  how_to_test:  "Set ui[7:5] to select pattern, ui[2:0] for shift amount, and ui[3] for masking. Observe uo pattern."
  language:     "Verilog"
  clock_hz:     10000000       # 10 MHz
  tiles:        "1x1"          
  top_module:   "tt_um_bytebeat" 

  source_files:
    - "project.v"

# The pinout of your project. 
pinout:
  # Inputs
  ui[0]: "Shift Bit 0"
  ui[1]: "Shift Bit 1"
  ui[2]: "Shift Bit 2"
  ui[3]: "Mask Enable"
  ui[4]: "Unused"
  ui[5]: "Pattern Sel 0"
  ui[6]: "Pattern Sel 1"
  ui[7]: "Pattern Sel 2"

  # Outputs
  uo[0]: "Bit 0 Out"
  uo[1]: "Bit 1 Out"
  uo[2]: "Bit 2 Out"
  uo[3]: "Bit 3 Out"
  uo[4]: "Bit 4 Out"
  uo[5]: "Bit 5 Out"
  uo[6]: "Bit 6 Out"
  uo[7]: "Bit 7 Out"

  # Bidirectional pins
  uio[0]: "Unused"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
