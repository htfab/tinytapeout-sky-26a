# Tiny Tapeout project information (Wokwi project)
project:
  wokwi_id:     0       # Set this to the ID of your Wokwi project (the number from the project's URL)
  title:        "Zenith TX26"      # Project title
  author:       "Doruk Orak"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A 16-bit CPU designed from scratch in Verilog. Runs Fibonacci sequence."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     27000000       # Clock frequency in Hz (or 0 if not applicable)
  top_module:  "tt_um_zenith_tx26"
  source_files:
    - tt_um_zenith_tx26.v
    - cpu_top.v
    - alu.v
    - control_unit.v
    - data_memory.v
    - instruction_decoder.v
    - instruction_mem.v
    - program_counter.v
    - register_file.v
    - sign_extender.v

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2


# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "R1 bit 0 (Fibonacci output)"
  uo[1]: "R1 bit 1"
  uo[2]: "R1 bit 2"
  uo[3]: "R1 bit 3"
  uo[4]: "R1 bit 4"
  uo[5]: "R1 bit 5"
  uo[6]: "R1 bit 6"
  uo[7]: "R1 bit 7"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

