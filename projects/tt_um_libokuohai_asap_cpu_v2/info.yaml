# Tiny Tapeout project information
project:
  title:        "ASAP CPU v2"      # Project title
  author:       "Aaron Libokuohai Bovensiepen"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A SAP-1 inspired CPU"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_libokuohai_asap_cpu_v2"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "controller.v"
    - "pc.v"
    - "mar.v"
    - "ir.v"
    - "out_reg.v"
    - "register.v"
    - "alu.v"
    - "ram.v"
    - "display.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "RAM BIT 1"
  ui[1]: "RAM BIT 2"
  ui[2]: "RAM BIT 3"
  ui[3]: "RAM BIT 4"
  ui[4]: "RAM BIT 5"
  ui[5]: "RAM BIT 6"
  ui[6]: "RAM BIT 7"
  ui[7]: "RAM BIT 8"

  # Outputs
  uo[0]: "SEG 1"
  uo[1]: "SEG 2"
  uo[2]: "SEG 3"
  uo[3]: "SEG 4"
  uo[4]: "SEG 5"
  uo[5]: "SEG 6"
  uo[6]: "SEG 7"
  uo[7]: "SEG SELECT 1"

  # Bidirectional pins
  uio[0]: "SEG SELECT 2 (OUT)"
  uio[1]: "SEG SELECT 3 (OUT)"
  uio[2]: "ADDRESS BIT 1 (IN)"
  uio[3]: "ADDRESS BIT 2 (IN)"
  uio[4]: "ADDRESS BIT 3 (IN)"
  uio[5]: "ADDRESS BIT 4 (IN)"
  uio[6]: "MODE (0 = RUN, 1 = PROGRAM) (IN)"
  uio[7]: "WRITE[PROGRAM MODE] | RESET[RUN MODE] (IN)"

# Do not change!
yaml_version: 6
