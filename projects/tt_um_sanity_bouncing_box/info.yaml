# Tiny Tapeout project information
project:
  title:        "Sanity Bouncing Box"
  author:       "kavsdev"
  discord:      "kavsdev"
  description:  "VGA demoscene entry: a square that bounces around the screen."
  language:     "Verilog"
  clock_hz:     25175000   # 25.175 MHz VGA pixel clock

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Top module must start with "tt_um_".
  top_module:  "tt_um_sanity_bouncing_box"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "hvsync_generator.v"

# Pinout follows the TinyVGA Pmod convention.
pinout:
  # Inputs (unused)
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs - TinyVGA Pmod
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "VSync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "HSync"

  # Bidirectional pins (unused)
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
