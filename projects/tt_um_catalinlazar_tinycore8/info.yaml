# Tiny Tapeout project information
project:
  title:        "TinyCore8"
  author:       "Catalin Lazar"
  discord:      ""
  description:  "An 8-bit programmable CPU with serial program loading for Tiny Tapeout SKY130."
  language:     "Verilog"
  clock_hz:     10000000

  tiles: "1x1"

  top_module:  "tt_um_catalinlazar_tinycore8"

  source_files:
    - "tt_um_catalinlazar_tinycore8.v"

pinout:
  # Inputs
  ui[0]: "load_clk"
  ui[1]: "load_data"
  ui[2]: "load_enable"
  ui[3]: "run"
  ui[4]: "in0"
  ui[5]: "in1"
  ui[6]: "in2"
  ui[7]: "in3"

  # Outputs
  uo[0]: "out0"
  uo[1]: "out1"
  uo[2]: "out2"
  uo[3]: "out3"
  uo[4]: "out4"
  uo[5]: "out5"
  uo[6]: "out6"
  uo[7]: "out7"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

yaml_version: 6