# Tiny Tapeout project information
project:
  title:        "Fibonacci Counter"      # Project title
  author:       "João Bortolace"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "16-bit Fibonacci counter with BCD converter and multiplexed driver for 5 displays."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     1000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_fibonacci_JoaoBortolace"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "Fibonacci.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "advance" # Advance the Fibonacci number.
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "seg_a" # segment A of 7 segments display
  uo[1]: "seg_b"
  uo[2]: "seg_c"
  uo[3]: "seg_d"
  uo[4]: "seg_e"
  uo[5]: "seg_f"
  uo[6]: "seg_g"
  uo[7]: "bcd_ready" # Indication of a new number

  # Bidirectional pins
  uio[0]: "digit_en_0" # Enables the display of the units.
  uio[1]: "digit_en_1" # Enables the display of the units.
  uio[2]: "digit_en_2"
  uio[3]: "digit_en_3"
  uio[4]: "digit_en_4"
  uio[5]: "digit_en_5"
  uio[6]: "none"
  uio[7]: "none"

# Do not change!
yaml_version: 6
