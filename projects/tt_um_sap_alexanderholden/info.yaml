  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "out_reg_bus_out[0]"
  uo[1]: "out_reg_bus_out[1]"
  uo[2]: "out_reg_bus_out[2]"
  uo[3]: "out_reg_bus_out[3]"
  uo[4]: "out_reg_bus_out[4]"
  uo[5]: "out_reg_bus_out[5]"
  uo[6]: "out_reg_bus_out[6]"
  uo[7]: "out_reg_bus_out[7]"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

