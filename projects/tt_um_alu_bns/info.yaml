# Tiny Tapeout project information
project:
  title:        "6-bit Multi-Functional ALU"
  author:       "Abdelrahman Ahmed"
  discord:      "ziadmokhtar0394"
  description:  "6-bit ALU featuring RCA, CLA, multipliers, logic, shifts, popcount, and comparison operations"
  language:     "Verilog"
  clock_hz:     0

  # Tile size
  tiles: "1x1"

  # Top module
  top_module:  "tt_um_alu_bns"

  # Source files
  source_files:
    - "project.v"

# Pin mapping
pinout:
  # Inputs
  ui[0]: "A[0]"
  ui[1]: "A[1]"
  ui[2]: "A[2]"
  ui[3]: "A[3]"
  ui[4]: "A[4]"
  ui[5]: "A[5]"
  ui[6]: "Cin"
  ui[7]: "Opcode[0]"

  # Outputs
  uo[0]: "Result[0]"
  uo[1]: "Result[1]"
  uo[2]: "Result[2]"
  uo[3]: "Result[3]"
  uo[4]: "Result[4]"
  uo[5]: "Result[5]"
  uo[6]: "Result[6]"
  uo[7]: "Result[7]"

  # Bidirectional pins used as inputs
  uio[0]: "B[0]"
  uio[1]: "B[1]"
  uio[2]: "B[2]"
  uio[3]: "B[3]"
  uio[4]: "B[4]"
  uio[5]: "B[5]"
  uio[6]: "Opcode[1]"
  uio[7]: "Opcode[2]"

# Do not change!
yaml_version: 6
