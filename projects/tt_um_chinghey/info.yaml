# Tiny Tapeout project information
project:
  title: "Hey FlexCompute-130" # Project title
  author: "Ching Hey Lau" # Your name
  discord: "hheylau" # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description: "8-bit NPU with SPI weight & ReLU + 12-bit CORDIC SINH/COSH/ATAN" # One line description of what your project does
  language: "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz: 0 # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1" # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module: "tt_um_chinghey"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "fsm_control.v"
    - "npu_core.v"
    - "spi.v"
    - "tt_um_chinghey.v"
    - "cordic_core.v"
    - "atan_lut.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "acc_out[0]"
  uo[1]: "acc_out[1]"
  uo[2]: "acc_out[2]"
  uo[3]: "acc_out[3]"
  uo[4]: "acc_out[4]"
  uo[5]: "acc_out[5]"
  uo[6]: "acc_out[6]"
  uo[7]: "acc_out[7]"

  # Bidirectional pins
  uio[0]: "spi_sclk" # Input from RP2040
  uio[1]: "spi_mosi" # Input (Weight data)
  uio[2]: "spi_cs" # Input (Active Low)
  uio[3]: "reset_acc" # reset accumulator or sin/cos
  uio[4]: "byte_sel" # Input: 0=LowByte, 1=HighByte
  uio[5]: "layer_done" # Output: Pulse when sum is finished
  uio[6]: "Active Mode[0]"
  uio[7]: "Active Mode[1]"
# 0,0,NPU Mode (CORDIC Idle)
# 0,1,CORDIC: SIN / COS (Circular)
# 1,0,CORDIC: SINH / COSH (Hyperbolic)
# 1,1,CORDIC: ATAN / ATANH (Vectoring)

# Do not change!
yaml_version: 6
