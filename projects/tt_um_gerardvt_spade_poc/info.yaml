# Tiny Tapeout project information
project:
  title:        "Interactive XOR Plasma (Spade HDL)"
  author:       "Gerard Talatinian"
  discord:      ""
  description:  "Interactive XOR plasma effect on VGA 640x480 @ 60Hz with 8 real-time controls, authored in Spade HDL"
  language:     "Spade"
  clock_hz:     25000000  # 25 MHz pixel clock for VGA 640x480 @ 60Hz

  tiles: "1x1"

  top_module:  "tt_um_gerardvt_spade_poc"

  # design.v is generated by swim build and committed for VGA Playground compatibility.
  # The docs/test/gds workflows each run swim build before their main step.
  # Do not edit src/design.v directly; edit spade/src/main.spade instead.
  source_files:
    - "tt_um_gvt.v"
    - "design.v"

pinout:
  # Inputs — all 8 active, independent bit fields
  ui[0]: "Pause animation"
  ui[1]: "Pattern select bit 0"
  ui[2]: "Pattern select bit 1"
  ui[3]: "Speed select bit 0"
  ui[4]: "Speed select bit 1"
  ui[5]: "Invert colours"
  ui[6]: "Colour rotation bit 0"
  ui[7]: "Colour rotation bit 1"

  # Outputs — TT VGA PMOD standard pin mapping
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "vsync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "hsync"

  # Bidirectional — unused
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
