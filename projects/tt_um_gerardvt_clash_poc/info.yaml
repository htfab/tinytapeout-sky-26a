# Tiny Tapeout project information
project:
  title:        "VGA Colour Bars (Clash HDL)"
  author:       "Gerard Talatinian"
  discord:      ""
  description:  "VGA 640x480 @ 60Hz colour bars generator, authored in Clash HDL (Haskell)"
  language:     "Clash"
  clock_hz:     25000000  # 25 MHz pixel clock for VGA 640x480 @ 60Hz

  tiles: "1x1"

  top_module:  "tt_um_gerardvt_clash_poc"

  # gvt_core.v is generated by Clash in CI and gitignored.
  # The docs/test/gds workflows each run clash --verilog before their main step.
  # Do not edit src/gvt_core.v directly; edit clash/src/Top.hs instead.
  source_files:
    - "gvt_core.v"

pinout:
  # Inputs — unused
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs — TT VGA PMOD standard pin mapping
  uo[0]: "R1"
  uo[1]: "G1"
  uo[2]: "B1"
  uo[3]: "vsync"
  uo[4]: "R0"
  uo[5]: "G0"
  uo[6]: "B0"
  uo[7]: "hsync"

  # Bidirectional — unused
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
