# Tiny Tapeout project information
project:
  title:        "tt_um_LH_TapeoutMultiplier"      # Project title
  author:       "Lewis Hunton"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit Baugh-Wooley multiplier developed as part of my 3rd year neural network project adapted for restricted IO access"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     40000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_LH_TapeoutMultiplier"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_LH_TapeoutMultiplier.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Data bit 0 / Output select (cmd[0])"
  ui[1]: "Data bit 1"
  ui[2]: "Data bit 2"
  ui[3]: "Data bit 3"
  ui[4]: "Data bit 4"
  ui[5]: "Data bit 5"
  ui[6]: "opcode LSB (00=load A, 01=load B, 10=start)"
  ui[7]: "opcode MSB"

  # Outputs
  uo[0]: "Product byte bit 0 (low byte)"
  uo[1]: "Product byte bit 1"
  uo[2]: "Product byte bit 2"
  uo[3]: "Product byte bit 3"
  uo[4]: "Product byte bit 4"
  uo[5]: "Product byte bit 5"
  uo[6]: "Product byte bit 6"
  uo[7]: "Product byte bit 7"

  # Bidirectional pins
  uio[0]: "Product bit 8 (high byte)"
  uio[1]: "Product bit 9"
  uio[2]: "Product bit 10"
  uio[3]: "Product bit 11"
  uio[4]: "Product bit 12"
  uio[5]: "Product bit 13"
  uio[6]: "Product bit 14"
  uio[7]: "Product bit 15"

# Do not change!
yaml_version: 6
