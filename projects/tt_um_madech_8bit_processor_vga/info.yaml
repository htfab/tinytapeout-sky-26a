# Tiny Tapeout project information
project:
  title:        "8-Bit Processor with VGA"      # Project title
  author:       "Marcus Alagar, Derek Maeshiro, Chloe Zhong"      # Your name
  discord:      "@bigturtle8, @professorderek, @Chlow"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit processor (with 16 bit instructions) that interacts with VGA"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25175000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_madech_8bit_processor_vga"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "hvsync_generator.v"
    - "processor_top.v"
    - "mem_handler.v"
    - "sipo.v"
    - "processor_no_spi.v"
    - "controller.v"
    - "pc.v"
    - "fetcher.v"
    - "decoder.v"
    - "executor.v"
    - "loader_storer.v"
    - "loader.v"
    - "storer.v"
    - "register.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: ""
  ui[1]: ""
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "R[1]"
  uo[1]: "G[1]"
  uo[2]: "B[1]"
  uo[3]: "VSYNC"
  uo[4]: "R[0]"
  uo[5]: "G[0]"
  uo[6]: "B[0]"
  uo[7]: "HSYNC"

  # Bidirectional pins
  uio[0]: "CS0 (Flash)"
  uio[1]: "MOSI"
  uio[2]: "MISO"
  uio[3]: "SCK"
  uio[4]: "NC"
  uio[5]: "NC"
  uio[6]: "CS1 (RAM A)"
  uio[7]: "CS2 (RAM B)"

# Do not change!
yaml_version: 6
